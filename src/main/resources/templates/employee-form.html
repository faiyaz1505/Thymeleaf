<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Employee Form</title>
    <!-- ✅ Add Bootstrap CSS -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        .required::after {
            content: " *";
            color: red;
        }
    </style>
</head>
<body>
<div class="container mt-4">
    <h2>Employee Form</h2>
    <form th:action="@{/save}" th:object="${employee}" method="post">
        <input type="hidden" th:field="*{id}" />
        
		<div class="mb-3">
		    <label class="form-label required">Name:</label>
		    <input type="text" th:field="*{name}" class="form-control" required
		           oninvalid="this.setCustomValidity('Please enter the employee name')"
		           oninput="this.setCustomValidity('')"/>
		    <div class="text-danger" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
		</div>

		<div class="mb-3">
		    <label class="form-label required">Email:</label>
		    <input type="email" th:field="*{email}" class="form-control" required
		           oninvalid="this.setCustomValidity('Enter a valid company email address')"
		           oninput="this.setCustomValidity('')"/>
		    <div class="text-danger" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
		</div>

		<div class="mb-3">
		    <label class="form-label required">Department:</label>
		    <input type="text" th:field="*{department}" class="form-control" required
		           oninvalid="this.setCustomValidity('Department name is required')"
		           oninput="this.setCustomValidity('')"/>
		    <div class="text-danger" th:if="${#fields.hasErrors('department')}" th:errors="*{department}"></div>
		</div>

		<div class="mb-3">
		    <label class="form-label required">Salary:</label>
		    <input type="number" th:field="*{salary}" class="form-control" required
		           oninvalid="this.setCustomValidity('Please provide the salary amount')"
		           oninput="this.setCustomValidity('')"/>
		    <div class="text-danger" th:if="${#fields.hasErrors('salary')}" th:errors="*{salary}"></div>
		</div>

        
        <button type="submit" class="btn btn-success">Save</button>
    </form>
</div>
</body>
</html>
