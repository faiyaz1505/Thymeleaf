<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Employee List</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-4">
    <h2>Employee List</h2>
    <a th:href="@{/new}" class="btn btn-primary mb-2">Add Employee</a>
    <table class="table table-bordered">
        <tr>
            <th>ID</th><th>Name</th><th>Email</th><th>Department</th><th>Salary</th><th>Actions</th>
        </tr>
        <tr th:each="emp : ${employees.content}">
            <td th:text="${emp.id}"></td>
            <td th:text="${emp.name}"></td>
            <td th:text="${emp.email}"></td>
            <td th:text="${emp.department}"></td>
            <td th:text="${emp.salary}"></td>
            <td>
                <a th:href="@{/edit/{id}(id=${emp.id})}" class="btn btn-warning btn-sm">Edit</a>
                <a th:href="@{/delete/{id}(id=${emp.id})}" class="btn btn-danger btn-sm">Delete</a>
            </td>
        </tr>
    </table>

    <div>
        <a th:if="${!employees.first}" th:href="@{/(page=${currentPage-1})}">Previous</a>
        <a th:if="${!employees.last}" th:href="@{/(page=${currentPage+1})}">Next</a>
    </div>
</div>
</body>
</html>
